name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'
  NODE_EMBED_VERSION: '22.22.2'
  OPENCLAW_REPO: 'https://github.com/openclaw/openclaw.git'
  OPENCLAW_VERSION: 'v2026.3.13-1'

jobs:
  # ─── Type check & lint ────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_DIR=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_DIR }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit

  # ─── macOS build (arm64 + x64) ───────────────────────────────────────────────
  build-mac:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            artifact_name: ClawStation-mac-arm64
          - arch: x64
            runner: macos-14
            artifact_name: ClawStation-mac-x64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_DIR=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_DIR }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache OpenClaw
        id: cache-openclaw
        uses: actions/cache@v4
        with:
          path: lib/openclaw
          key: openclaw-${{ runner.os }}-${{ matrix.arch }}-${{ env.OPENCLAW_VERSION }}

      - name: Fetch OpenClaw dependency
        if: steps.cache-openclaw.outputs.cache-hit != 'true'
        run: |
          mkdir -p lib
          git clone --depth 1 --branch ${{ env.OPENCLAW_VERSION }} ${{ env.OPENCLAW_REPO }} lib/openclaw

      - name: Restore OpenClaw build artifacts
        uses: actions/cache@v4
        with:
          path: resources/openclaw
          key: openclaw-build-${{ runner.os }}-${{ matrix.arch }}-${{ env.OPENCLAW_VERSION }}

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build openclaw
        run: node scripts/build-openclaw.js

      - name: Archive openclaw (required by electron-builder)
        run: node scripts/archive-openclaw.js

      - name: Download Node.js runtime for embedding
        run: node scripts/download-node.js darwin ${{ matrix.arch }}
        env:
          NODE_VERSION: ${{ env.NODE_EMBED_VERSION }}

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps --arch ${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS
        run: npm run build -- --mac --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-dmg
          path: release/*.dmg
          retention-days: 14

  # ─── Windows build ───────────────────────────────────────────────────────────
  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_DIR=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_DIR }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache OpenClaw
        id: cache-openclaw
        uses: actions/cache@v4
        with:
          path: lib/openclaw
          key: openclaw-${{ runner.os }}-x64-${{ env.OPENCLAW_VERSION }}

      - name: Fetch OpenClaw dependency
        if: steps.cache-openclaw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p lib
          git clone --depth 1 --branch ${{ env.OPENCLAW_VERSION }} ${{ env.OPENCLAW_REPO }} lib/openclaw

      - name: Restore OpenClaw build artifacts
        uses: actions/cache@v4
        with:
          path: resources/openclaw
          key: openclaw-build-${{ runner.os }}-x64-${{ env.OPENCLAW_VERSION }}

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build openclaw
        run: node scripts/build-openclaw.js

      - name: Archive openclaw (required by electron-builder)
        run: node scripts/archive-openclaw.js

      - name: Download Node.js runtime for embedding
        run: node scripts/download-node.js win32 x64
        env:
          NODE_VERSION: ${{ env.NODE_EMBED_VERSION }}

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps --arch x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows
        run: npm run build -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClawStation-win-setup
          path: release/*.exe
          retention-days: 14

  # ─── Release (only on tags) ───────────────────────────────────────────────────
  release:
    needs: [typecheck, build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: List release artifacts
        run: find release -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.dmg
            release/**/*.exe
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
