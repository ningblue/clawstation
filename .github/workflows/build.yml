name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            artifact_name: ClawStation-arm64
          - arch: x64
            artifact_name: ClawStation-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps --arch ${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-dmg
          path: release/*.dmg

  build-win:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps --arch x64

      - name: Build Windows
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClawStation-win-setup
          path: release/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/mac

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/win

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/mac/*.dmg
            release/win/*.exe
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
