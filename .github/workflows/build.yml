name: Build and Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'
  NODE_EMBED_VERSION: '22.22.2'
  OPENCLAW_REPO: 'https://github.com/openclaw/openclaw.git'
  OPENCLAW_VERSION: 'v2026.3.13-1'

jobs:
  # ─── Type check & lint ────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_DIR=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_DIR }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit

  # ─── macOS build (arm64 + x64) ───────────────────────────────────────────────
  build-mac:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            artifact_name: ClawStation-mac-arm64
          - arch: x64
            runner: macos-14
            artifact_name: ClawStation-mac-x64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_DIR=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_DIR }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache OpenClaw
        id: cache-openclaw
        uses: actions/cache@v4
        with:
          path: lib/openclaw
          key: openclaw-${{ runner.os }}-${{ matrix.arch }}-${{ env.OPENCLAW_VERSION }}

      - name: Fetch OpenClaw dependency
        if: steps.cache-openclaw.outputs.cache-hit != 'true'
        run: |
          mkdir -p lib
          git clone --depth 1 --branch ${{ env.OPENCLAW_VERSION }} ${{ env.OPENCLAW_REPO }} lib/openclaw

      - name: Restore OpenClaw build artifacts
        uses: actions/cache@v4
        with:
          path: resources/openclaw
          key: openclaw-build-${{ runner.os }}-${{ matrix.arch }}-${{ env.OPENCLAW_VERSION }}

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Verify 7za available
        run: |
          if [ -f "node_modules/7zip-bin/mac/${{ matrix.arch }}/7za" ]; then
            ls -lh "node_modules/7zip-bin/mac/${{ matrix.arch }}/7za"
            echo "✅ 7za found for ${{ matrix.arch }}"
          else
            echo "❌ 7za not found for ${{ matrix.arch }}"
            exit 1
          fi

      - name: Build openclaw
        run: node scripts/build-openclaw.js

      - name: Archive openclaw (required by electron-builder)
        run: node scripts/archive-openclaw.js

      - name: Download Node.js runtime for embedding
        run: node scripts/download-node.js darwin ${{ matrix.arch }}
        env:
          NODE_VERSION: ${{ env.NODE_EMBED_VERSION }}

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps --arch ${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS
        run: npm run build:main && npm run build:renderer && npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Verify build artifacts
        run: |
          echo "Checking build artifacts for ${{ matrix.arch }}..."
          
          APP_PATH="release/mac-${{ matrix.arch }}/XClaw.app/Contents/Resources"
          
          # 检查 openclaw 目录是否被解压
          if [ -d "$APP_PATH/openclaw" ]; then
            echo "✅ openclaw directory extracted"
            ls -la "$APP_PATH/openclaw" | head -5
          else
            echo "❌ openclaw directory NOT found"
            exit 1
          fi
          
          # 检查 Node.js 运行时
          if [ -f "$APP_PATH/node/bin/node" ]; then
            echo "✅ Node.js runtime included"
          else
            echo "❌ Node.js runtime NOT found"
            exit 1
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-dmg
          path: release/*.dmg
          retention-days: 14

  # ─── Windows build ───────────────────────────────────────────────────────────
  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 排除 Windows Defender 扫描工作目录，避免锁定 .pnpm 文件导致 EPERM
      - name: Exclude Windows Defender
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE"
          Write-Host "Windows Defender exclusion added for $env:GITHUB_WORKSPACE"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_DIR=$(pnpm store path)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_DIR }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Cache OpenClaw source
        id: cache-openclaw
        uses: actions/cache@v4
        with:
          path: lib/openclaw
          key: openclaw-${{ runner.os }}-x64-${{ env.OPENCLAW_VERSION }}

      - name: Fetch OpenClaw dependency
        if: steps.cache-openclaw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p lib
          git clone --depth 1 --branch ${{ env.OPENCLAW_VERSION }} ${{ env.OPENCLAW_REPO }} lib/openclaw

      # 清除所有嵌套的 node_modules 缓存（包括 workspace 子项目），
      # 避免上次失败的损坏符号链接残留导致 EPERM
      - name: Clean OpenClaw all node_modules
        shell: bash
        run: find lib/openclaw -name node_modules -type d -prune -exec rm -rf {} +

      - name: Restore OpenClaw build artifacts
        uses: actions/cache@v4
        with:
          path: resources/openclaw
          key: openclaw-build-${{ runner.os }}-x64-${{ env.OPENCLAW_VERSION }}

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Verify 7za.exe available
        shell: powershell
        run: |
          $7zaPath = "node_modules/7zip-bin/win/x64/7za.exe"
          if (Test-Path $7zaPath) {
            $size = (Get-Item $7zaPath).Length / 1MB
            Write-Host "✅ 7za.exe found: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "❌ 7za.exe not found at $7zaPath"
            exit 1
          }

      - name: Build openclaw
        run: node scripts/build-openclaw.js

      - name: Archive openclaw (required by electron-builder)
        run: node scripts/archive-openclaw.js

      - name: Download Node.js runtime for embedding
        run: node scripts/download-node.js win32 x64
        env:
          NODE_VERSION: ${{ env.NODE_EMBED_VERSION }}

      - name: Rebuild native modules
        run: npx electron-builder install-app-deps --arch x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows
        run: npm run build:main && npm run build:renderer && npx electron-builder --win --publish never

      - name: Verify build artifacts
        shell: powershell
        run: |
          Write-Host "Checking build artifacts..."
          
          # 检查 7za.exe 是否被复制到 resources
          if (Test-Path "release/win-unpacked/resources/7za.exe") {
            Write-Host "✅ 7za.exe included in resources"
          } else {
            Write-Host "❌ 7za.exe NOT found in resources - installer will fail!"
            exit 1
          }
          
          # 检查 openclaw-x64.7z 是否存在
          if (Test-Path "release/win-unpacked/resources/openclaw-x64.7z") {
            $size = (Get-Item "release/win-unpacked/resources/openclaw-x64.7z").Length / 1MB
            Write-Host "✅ openclaw-x64.7z included: $([math]::Round($size, 2)) MB"
          } else {
            Write-Host "❌ openclaw-x64.7z NOT found in resources"
            exit 1
          }
          
          # 检查 Node.js 运行时
          if (Test-Path "release/win-unpacked/resources/node/bin/node.exe") {
            Write-Host "✅ Node.js runtime included"
          } else {
            Write-Host "❌ Node.js runtime NOT found"
            exit 1
          }

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClawStation-win-setup
          path: release/*.exe
          retention-days: 14

  # ─── Release (only on tags) ───────────────────────────────────────────────────
  release:
    needs: [typecheck, build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: List release artifacts
        run: find release -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/**/*.dmg
            release/**/*.exe
          draft: true
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
