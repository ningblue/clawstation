appId: ai.clawstation
productName: ClawStation
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
extraResources:
  - from: resources/openclaw
    to: openclaw
  - from: resources/
    to: resources/
    filter:
      - "**/*"
  - from: resources/node/${os}-${arch}/node
    to: node
    filter:
      - "**/*"
  - from: scripts/
    to: scripts/
    filter:
      - "clawstation-claw-launcher.js"
asar: true
asarUnpack:
  - "**/*.node"
  - "**/openclaw/**"
  - "**/better-sqlite3/**"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  icon: resources/icon.png
win:
  target: nsis
  artifactName: ${productName}-Setup-${version}.${ext}
  icon: resources/icon.png
linux:
  target: AppImage
  category: Office
  icon: resources/icon.png
nsis:
  oneClick: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
