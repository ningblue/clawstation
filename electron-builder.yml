appId: ai.xclaw
productName: XClaw
electronLanguages: # Only include these languages to reduce size
  - zh-CN
  - en-US
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
extraResources:
  - from: resources/openclaw.zip
    to: openclaw.zip
  - from: resources/
    to: resources/
    filter:
      - "**/*"
      - "!openclaw/**" # openclaw单独处理
      - "!openclaw.zip" # 避免重复复制
      - "!node/**" # node单独处理，避免重复复制
  - from: resources/node/${os}-${arch}/node
    to: node
    filter:
      - "**/*"
  - from: scripts/
    to: scripts/
    filter:
      - "clawstation-claw-launcher.js"
      - "claw-launcher/**/*"
asar: true
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  icon: resources/icon.png
win:
  target: nsis
  artifactName: ${productName}-Setup-${version}.${ext}
  icon: resources/icon.png
linux:
  target: AppImage
  category: Office
  icon: resources/icon.png
afterPack: scripts/after-pack.js
nsis:
  oneClick: false

  allowElevation: true
  allowToChangeInstallationDirectory: true
  include: scripts/installer.nsh
