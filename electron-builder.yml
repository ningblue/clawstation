appId: ai.xclaw
productName: XClaw
electronLanguages: # Only include these languages to reduce size
  - zh-CN
  - en-US
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
extraResources:
  - from: resources/openclaw.7z
    to: openclaw.7z
  - from: resources/node/${os}-${arch}/node
    to: node
  - from: resources/icon.icns
    to: icon.icns
  - from: scripts/
    to: scripts/
    filter:
      - "clawstation-claw-launcher.js"
      - "claw-launcher/**/*"
asar: false
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  icon: resources/icon.png
win:
  target: nsis
  artifactName: ${productName}-Setup-${version}.${ext}
  icon: resources/icon.png
  extraResources:
    - from: resources/7za.exe
      to: 7za.exe
linux:
  target: AppImage
  category: Office
  icon: resources/icon.png
afterPack: scripts/after-pack.js
nsis:
  oneClick: false

  allowElevation: true
  allowToChangeInstallationDirectory: true
  include: scripts/installer.nsh
