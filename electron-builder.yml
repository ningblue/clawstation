appId: ai.xclaw
productName: XClaw
electronLanguages: # Only include these languages to reduce size
  - zh-CN
  - en-US
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
extraResources:
  # OpenClaw - 架构特定版本
  - from: resources/openclaw-arm64.7z
    to: openclaw-arm64.7z
  - from: resources/openclaw-x64.7z
    to: openclaw-x64.7z
  # Node.js 运行时 - 架构特定
  - from: resources/node/${os}-${arch}/node
    to: node
  - from: scripts/
    to: scripts/
    filter:
      - "clawstation-claw-launcher.js"
      - "claw-launcher/**/*"
asar: false
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  icon: resources/icon.icns
win:
  target: nsis
  artifactName: ${productName}-Setup-${version}.${ext}
  icon: resources/icon.png
  extraResources:
    # 使用 7zip-bin 包中的 7za.exe（打包时自动复制）
    - from: node_modules/7zip-bin/win/x64/7za.exe
      to: 7za.exe
linux:
  target: AppImage
  category: Office
  icon: resources/icon.png
afterPack: scripts/after-pack.js
nsis:
  oneClick: false

  allowElevation: true
  allowToChangeInstallationDirectory: true
  include: scripts/installer.nsh
